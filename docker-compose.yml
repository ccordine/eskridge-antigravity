services:
  acs-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-acs-app}:latest
    restart: unless-stopped
    expose:
      - "8080"

  acs-web:
    image: nginx:1.27-alpine
    depends_on:
      - acs-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-9008}:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
