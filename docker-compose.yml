services:
  acs-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-acs-app}:latest
    container_name: ${APP_CONTAINER_NAME:-eskridge-antigravity-app}
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - dev-net

  acs-web:
    image: nginx:1.27-alpine
    container_name: ${WEB_CONTAINER_NAME:-eskridge-antigravity-web}
    depends_on:
      - acs-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-9008}:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dev-net

networks:
  dev-net:
    external: true
